function GSTR1({inv}){
  const summary=useMemo(()=>{
    const byRate={};
    inv.forEach(i=>{const r=i.gst_rate;if(!byRate[r])byRate[r]={rate:r,taxable:0,cgst:0,sgst:0,count:0};
      byRate[r].taxable+=Number(i.taxable_amount);byRate[r].cgst+=Number(i.gst_amount)/2;byRate[r].sgst+=Number(i.gst_amount)/2;byRate[r].count++});
    return Object.values(byRate).sort((a,b)=>a.rate-b.rate);
  },[inv]);
  const totTax=inv.reduce((s,i)=>s+Number(i.taxable_amount),0);
  const totGST=inv.reduce((s,i)=>s+Number(i.gst_amount),0);
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <Panel title="GSTR-1 SUMMARY · READY FOR FILING">
      {inv.length===0?<Empty msg="Create invoices to generate GSTR-1 summary."/>:(<>
        <Scroll><table style={tbl}><thead><tr style={trH}><th style={th}>GST RATE</th><th style={thR}>INVOICES</th><th style={thR}>TAXABLE VALUE</th><th style={thR}>CGST</th><th style={thR}>SGST</th><th style={thR}>TOTAL GST</th></tr></thead><tbody>
        {summary.map((r,i)=>(<tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
          <td style={{...td,color:C.gold,fontWeight:600}}>{r.rate}%</td>
          <td style={tdR}>{r.count}</td>
          <td style={tdR}>{fmt(r.taxable)}</td>
          <td style={tdR}>{fmt(r.cgst)}</td>
          <td style={tdR}>{fmt(r.sgst)}</td>
          <td style={{...tdR,fontWeight:500}}>{fmt(r.cgst+r.sgst)}</td>
        </tr>))}
        <tr style={{borderTop:`1px solid ${C.goldS}`}}>
          <td style={{...td,color:C.gold,fontWeight:600}}>TOTAL</td>
          <td style={tdR}>{inv.length}</td>
          <td style={{...tdR,fontWeight:600}}>{fmt(totTax)}</td>
          <td style={tdR}>{fmt(totGST/2)}</td>
          <td style={tdR}>{fmt(totGST/2)}</td>
          <td style={{...tdR,color:C.gold,fontWeight:600}}>{fmt(totGST)}</td>
        </tr></tbody></table></Scroll>
        <div style={{fontSize:9,color:C.dim,marginTop:10,lineHeight:1.7}}>Values ready for GSTR-1 filing · Share with your CA</div>
      </>)}
    </Panel>
  </div>)}

function CLAIMR(){
  const[active,setActive]=useState("dash");
  const[pro,setPro]=useState(false);
  const[godPro,setGodPro]=useState(()=>localStorage.getItem("claimr_god")==="1");
  const[inv,setInv]=useState([]);
  const[pur,setPur]=useState([]);
  const[biz,setBiz]=useState("");
  const[gstin,setGstin]=useState("");
  const[loading,setLoading]=useState(true);
  const[showSecret,setShowSecret]=useState(false);
  const[showInv,setShowInv]=useState(false);
  const[showPur,setShowPur]=useState(false);
  const uid=useRef(null);
  const isMobile=useIsMobile();
  const seq=1001+inv.length;
  const isProActive=pro||godPro;
  const walled=!isProActive&&inv.length>=FREE_INV;

  useEffect(()=>{(async()=>{
    try{
      const{data:{user}}=await sb.auth.getUser();
      if(!user){setLoading(false);return}
      uid.current=user.id||user.sub;
      try{const{data:p}=await sb.from("profiles").select("*").eq("id",uid.current).single();
        if(p){if(p.is_pro)setPro(true);if(p.business_name)setBiz(p.business_name);if(p.gstin)setGstin(p.gstin)}}catch(e){}
      try{const{data:d}=await sb.from("invoices").select("*").eq("user_id",uid.current).order("created_at",{ascending:false});
        if(d&&Array.isArray(d))setInv(d.map(i=>({...i,_dbid:i.id})))}catch(e){}
      try{const{data:d}=await sb.from("purchases").select("*").eq("user_id",uid.current).order("created_at",{ascending:false});
        if(d&&Array.isArray(d))setPur(d.map(p=>({...p,_dbid:p.id})))}catch(e){}
    }catch(e){}
    setLoading(false);
  })()},[]);

  const addInv=async i=>{setInv(p=>[{...i,_dbid:null},...p]);
    try{if(uid.current){const{data:d}=await sb.from("invoices").insert({user_id:uid.current,...i});
      if(d)setInv(p=>p.map((x,idx)=>idx===0?{...x,_dbid:d[0]?.id}:x))}}catch(e){}};
  const cycleStatus=async(dbid,cur)=>{const ns={PENDING:"PAID",PAID:"OVERDUE",OVERDUE:"PENDING"}[cur]||"PENDING";
    setInv(p=>p.map(i=>i._dbid===dbid?{...i,status:ns}:i));
    try{if(dbid)await sb.from("invoices").update({status:ns}).eq("id",dbid)}catch(e){}};
  const addPur=async p=>{setPur(prev=>[{...p,_dbid:null},...prev]);
    try{if(uid.current){const{data:d}=await sb.from("purchases").insert({user_id:uid.current,...p});
      if(d)setPur(prev=>prev.map((x,i)=>i===0?{...x,_dbid:d[0]?.id}:x))}}catch(e){}};
  const toggleReconcile=async(dbid,cur)=>{const nv=!cur;
    setPur(p=>p.map(x=>x._dbid===dbid?{...x,reconciled:nv}:x));
    try{if(dbid)await sb.from("purchases").update({reconciled:nv}).eq("id",dbid)}catch(e){}};
  const unlockPro=async()=>{setPro(true);try{if(uid.current)await sb.from("profiles").update({is_pro:true}).eq("id",uid.current)}catch(e){}};
  const unlockGod=()=>{setGodPro(true);localStorage.setItem("claimr_god","1")};

  if(loading)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.label,fontSize:10,letterSpacing:3}}>LOADING CLAIMR...</div>);

  const NavBtn=({m})=>(<button onClick={()=>setActive(m.id)} style={{display:"flex",alignItems:"center",padding:isMobile?"9px 12px":"11px 18px",width:isMobile?"auto":"100%",background:"transparent",border:"none",borderLeft:isMobile?"none":(active===m.id?`1px solid ${C.gold}`:"1px solid transparent"),borderBottom:isMobile?(active===m.id?`2px solid ${C.gold}`:"2px solid transparent"):"none",color:active===m.id?C.gold:C.label,fontFamily:"inherit",fontSize:9,letterSpacing:2,cursor:"pointer",textAlign:"left",whiteSpace:"nowrap"}}>{m.l}</button>);

  const render=()=>{switch(active){
    case"dash":return<Dashboard inv={inv} pur={pur} pro={isProActive}/>;
    case"invoices":return<Invoices inv={inv} onAdd={()=>setShowInv(true)} onStatus={cycleStatus} pro={pro} godPro={godPro}/>;
    case"itc":return<ITCTracker pur={pur} onAdd={()=>setShowPur(true)} onToggle={toggleReconcile} pro={pro} godPro={godPro}/>;
    case"gstr":return<GSTR1 inv={inv}/>;
    case"reports":return<Reports inv={inv} pur={pur} biz={biz}/>;
    case"config":return<Config biz={biz} setBiz={setBiz} gstin={gstin} setGstin={setGstin} pro={isProActive} uid={uid}/>;
    default:return null}};

  return(<div style={{background:C.bg,color:C.text,minHeight:"100vh",fontSize:12}}>
    <StatusBar pro={isProActive} onSecret={()=>setShowSecret(true)} onLogout={async()=>{await sb.auth.signOut();location.reload()}}/>
    <Ticker/>
    {isMobile&&<div style={{display:"flex",overflowX:"auto",background:"#070709",borderBottom:`1px solid ${C.border}`,WebkitOverflowScrolling:"touch"}}>
      {MODS.map(m=><NavBtn key={m.id} m={m}/>)}</div>}
    <div style={{display:"flex",minHeight:"calc(100vh - 72px)"}}>
      {!isMobile&&<div style={{width:168,background:"#070709",borderRight:`1px solid ${C.border}`,padding:"14px 0",flexShrink:0}}>
        {MODS.map(m=><NavBtn key={m.id} m={m}/>)}
        <div style={{padding:"16px 18px",marginTop:16,borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:8,color:C.dim,letterSpacing:2,marginBottom:6}}>MEMBERSHIP</div>
          <div style={{fontSize:10,color:C.gold,letterSpacing:1}}>{isProActive?"PRO":"FREE"}</div>
          <div style={{fontSize:8,color:C.label,marginTop:4}}>{isProActive?"Unlimited access":`${Math.max(0,FREE_INV-inv.length)} free invoices left`}</div>
        </div>
      </div>}
      <div style={{flex:1,padding:14,overflow:"hidden",minWidth:0}} className={walled?"blurred":""}>
        <div style={{marginBottom:14}}>
          <h1 style={{fontSize:14,fontWeight:600,letterSpacing:2,color:C.white}}>{MODS.find(m=>m.id===active)?.l}</h1>
          <div style={{fontSize:9,color:C.label,marginTop:4,letterSpacing:1}}>CLAIMR · GST & ITC INTELLIGENCE · {biz||"SET BUSINESS NAME IN CONFIG"}</div>
        </div>
        {render()}
      </div>
    </div>
    {walled&&<Paywall onUnlock={unlockPro}/>}
    {showSecret&&<SecretEntry onClose={()=>setShowSecret(false)} onUnlock={unlockGod}/>}
    {showInv&&<InvModal onClose={()=>setShowInv(false)} onSave={addInv} seq={seq} isMobile={isMobile}/>}
    {showPur&&<PurModal onClose={()=>setShowPur(false)} onSave={addPur} isMobile={isMobile}/>}
  </div>)}

function App(){
  const[session,setSession]=useState(undefined);
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return()=>sub.subscription.unsubscribe();
  },[]);
  if(session===undefined)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.label,fontSize:10,letterSpacing:3}}>INITIALIZING...</div>);
  if(!session)return<AuthGate onAuthed={()=>location.reload()}/>;
  return<CLAIMR key={session?.user?.id||"app"}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
